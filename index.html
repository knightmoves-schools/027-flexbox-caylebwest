<html>

<head>
    <title>Flexbox</title>
    <style>

        .item {
            padding: 5px;
            margin: 5px;
            width: 50px;
            text-align: center;
            border-style: solid;
        }

        .row {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
        }

        
    </style>
</head>

<body>
    <div class="row">
        <div class="item">first</div>
        <div class="item">second</div>
        <div class="item">thrid</div>
    </div>
</body>

</html>
